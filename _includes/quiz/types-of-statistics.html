<h2 id="quiz" class="mt-5">📌 Try It Yourself</h2>

<p><strong>Q:</strong> If you summarize test scores from 100 students using an average and a histogram, are you using descriptive or inferential statistics?</p>

<details class="my-2">
  <summary><strong>💡 Show Answer</strong></summary>
  <p>
    ✅ <strong>Descriptive statistics</strong> — you're describing the data you already have, not making predictions or generalizations.
  </p>
</details>
