<h2 id="quiz" class="mt-5">📌 Try It Yourself</h2>

<p><strong>Q:</strong> If your data has outliers that raise the mean, which measure of center is more reliable: mean or median?</p>

<details class="my-2">
  <summary><strong>💡 Show Answer</strong></summary>
  <p>
    ✅ <strong>Median</strong> — because it's resistant to outliers, unlike the mean which gets skewed.
  </p>
</details>
