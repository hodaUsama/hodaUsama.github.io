<h2 id="quiz" class="mt-5">📌 Try It Yourself</h2>

<p><strong>Q:</strong> If 80% of students who studied <em>Often</em> passed, is this a marginal or conditional proportion?</p>

<details class="my-2">
  <summary><strong>💡 Show Answer</strong></summary>
  <p>
    ✅ <strong>Conditional</strong> — it compares outcomes <strong>within a specific group</strong>.
  </p>
</details>
